name: PR Check

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: '22'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Test
        run: ./gradlew clean check

      - name: Upload reports if failed
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: pr-reports
          path: |
            **/build/reports/
            **/build/test-results/
